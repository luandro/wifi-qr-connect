name: Release - Fedora

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-fedora:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 python3-pyzbar python3-numpy desktop-file-utils

      - name: Create tarball
        run: |
          mkdir -p SOURCES/usr/bin
          mkdir -p SOURCES/usr/share/applications
          mkdir -p SOURCES/usr/share/icons/hicolor/scalable/apps
          mkdir -p SOURCES/usr/share/doc/wifi-qr-connect

          cp src/wifi-qr-connect SOURCES/usr/bin/
          cp src/wifi-qr-gui SOURCES/usr/bin/
          sed 's|Exec=wifi-qr-gui|Exec=/usr/bin/wifi-qr-gui|' packaging/wifi-qr-connect.desktop > SOURCES/usr/share/applications/wifi-qr-connect.desktop
          cp assets/wifi-qr-icon.svg SOURCES/usr/share/icons/hicolor/scalable/apps/wifi-qr-connect.svg
          cp README.md SOURCES/usr/share/doc/wifi-qr-connect/

          tar -czf wifi-qr-connect-${{ github.ref_name }}-fedora.tar.gz -C SOURCES .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: wifi-qr-connect-${{ github.ref_name }}-fedora.tar.gz
          retention-days: 30

  release:
    needs: build-fedora
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: dist
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
