name: Release - Arch Linux

on:
  release:
    types: [published]

jobs:
  build-arch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-4.0 gir1.2-adw-1 python3-pyzbar python3-numpy

      - name: Create tarball
        run: |
          tar -czf wifi-qr-connect-${{ github.ref_name }}-arch.tar.gz \
            --transform 's|^|wifi-qr-connect/|\' \
            src/wifi-qr-connect src/wifi-qr-gui \
            packaging/wifi-qr-connect.desktop \
            assets/wifi-qr-icon.svg README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: wifi-qr-connect-${{ github.ref_name }}-arch.tar.gz
          retention-days: 30

  release:
    needs: build-arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: arch-package
          path: dist
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}