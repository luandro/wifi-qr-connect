name: Release - macOS

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install zbar pillow numpy

      - name: Create tarball
        run: |
          mkdir -p wifi-qr-connect-${{ github.ref_name }}/usr/bin
          cp src/wifi-qr-connect wifi-qr-connect-${{ github.ref_name }}/usr/bin/
          cp src/wifi-qr-gui wifi-qr-connect-${{ github.ref_name }}/usr/bin/
          tar -czf wifi-qr-connect-${{ github.ref_name }}-macos-x86_64.tar.gz wifi-qr-connect-${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: wifi-qr-connect-${{ github.ref_name }}-macos-x86_64.tar.gz
          retention-days: 30

  release:
    needs: build-macos
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-package
          path: dist
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}